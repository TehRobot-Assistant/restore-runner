{{define "settings-content"}}
<h1>Settings</h1>

{{if .Saved}}<div class="ok">Saved. Changes apply to new repos + the next scheduler sweep.</div>{{end}}

<form method="post" action="/settings" class="stack">
  <fieldset>
    <legend>Defaults</legend>
    <label>
      Default cadence (hours)
      <input type="number" name="default_cadence_hours" min="1" max="8760" value="{{.Settings.DefaultCadenceHours}}">
      <span class="small muted">Pre-fill for new repos. 168 = weekly. Each repo can override this.</span>
    </label>
    <label>
      Default sample size
      <input type="number" name="default_sample_size" min="1" max="10000" value="{{.Settings.DefaultSampleSize}}">
      <span class="small muted">Files pulled from the backup per rehearsal.</span>
    </label>
    <label>
      Scratch directory
      <input type="text" name="scratch_dir" value="{{.Settings.ScratchDir}}">
      <span class="small muted">Where restored samples land briefly during a rehearsal. Inside the container, <code>/tmp/restorerunner</code> is usually fine — the compose file mounts it as tmpfs.</span>
    </label>
  </fieldset>

  <fieldset>
    <legend>Notifications</legend>
    <label>
      Apprise URLs (one per line)
      <textarea name="apprise_urls" rows="4" placeholder="ntfys://user:token@ntfy.example/restorerunner&#10;discord://webhook_id/webhook_token">{{range .Settings.AppriseURLs}}{{.}}
{{end}}</textarea>
      <span class="small muted">110+ services supported. See the <a href="https://github.com/caronc/apprise/wiki" target="_blank" rel="noopener">Apprise URL syntax wiki</a>.</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" name="notify_on_fail" {{if .Settings.NotifyOnFail}}checked{{end}}>
      Notify on <strong>fail</strong> (backup unreachable or source collapse)
    </label>
    <label class="checkbox">
      <input type="checkbox" name="notify_on_degraded" {{if .Settings.NotifyOnDegraded}}checked{{end}}>
      Notify on <strong>degraded</strong> (some sampled files diverged or missing)
    </label>
    <label class="checkbox">
      <input type="checkbox" name="notify_on_pass" {{if .Settings.NotifyOnPass}}checked{{end}}>
      Notify on <strong>pass</strong> (weekly reassurance — off by default)
    </label>
  </fieldset>

  <button type="submit">Save settings</button>
</form>
{{end}}
