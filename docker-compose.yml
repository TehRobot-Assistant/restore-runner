# RestoreRunner — upload an Unraid AppData backup, boot it, watch logs.
#
# Zero-config install:
#   1. docker compose up -d
#   2. Open http://<host>:8922 — create admin via the first-run wizard
#
# No YAML app config. Settings are env vars + the web UI.

services:
  restore-runner:
    image: tehrobot/restore-runner:latest
    container_name: restore-runner
    ports:
      - "8922:8922"
    volumes:
      # Single data volume: SQLite DB + extracted uploads + persisted logs.
      - ./config:/config
      # Docker socket is MANDATORY. Without it the app can't boot the
      # captured container — that's its entire job.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Optional tunables:
      # - RR_MAX_UPLOAD_MB=2048
      # - RR_RUN_TIMEOUT_MIN=10
      # Optional admin seed (skip the web wizard):
      # - ADMIN_USERNAME=admin
      # - ADMIN_PASSWORD=changeme
      TZ: Etc/UTC
    restart: unless-stopped
