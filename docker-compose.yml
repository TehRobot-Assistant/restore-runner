# Pull-and-run compose for RestoreRunner. Mirrors docker-manager /
# patch-pulse shape. Security posture compensates for running as root
# inside the container.

services:
  restore-runner:
    image: tehrobot/restore-runner:latest
    container_name: restore-runner
    restart: unless-stopped
    # Compose-level security constraints — these compensate for root-in-container.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    ports:
      - "127.0.0.1:8920:8920"
    volumes:
      # All app state (SQLite DB, master key, baselines) lives here.
      - ./config:/config
      # Mount whatever backup source paths you want to verify as READ-ONLY.
      # RestoreRunner never writes to these.
      # - /mnt/user/data:/srv/data:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8920/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
